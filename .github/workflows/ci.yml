name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cheapest checks that catch the most real bugs: lint + typecheck + build + test.
# Drop in-flight runs when a new commit lands on the same ref (free-tier minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: lint · typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: CI (lint · typecheck · build · test)
        run: pnpm run ci
